name: Compile zygisk arm64-v8a.so

on:
  workflow_dispatch:
  push:
    paths:
      - 'zygisk/**'
      - '.github/workflows/compile.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download NDK r27c
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
          unzip -q android-ndk-r27c-linux.zip -d $HOME
      - name: Compile
        run: |
          export NDK=$HOME/android-ndk-r27c
          cd zygisk
          bash build.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arm64-v8a
          path: zygisk/arm64-v8a.so